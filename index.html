<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>叼毛仓库</title>
    <style>
        *{
            padding: 0;
            margin: 0;
        }
        body {
            background: #223;
            color: #aaa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .shell{
            position: relative;
            display: block;
            width: 700px;
        }
        details{
            position: relative;
            width: auto;
            height: auto;
            overflow: hidden;
            max-height: 2.5em !important;
            transition: 1s;
        }
        details[open]{
            max-height: 700px !important;
        }
        details>summary{
            position: relative;
            margin-top: 0.25em;
            color: #99e;
            padding: 0.1em .5em .2em;
            background-color: #444;
        }
        details>summary::before{
            content: '闭';
            color: #eee;
            margin-right: 0.5em;
        }
        details[open]>summary{
            background-color: #66e;
            color: #fff;
        }
        details[open]>summary::before{
            content: '开';
            color: #fff;
        }
        .folder{
            border-left: 1px dotted #fff;
            border-bottom: 1px dotted #fff;
            margin: 0 0 10px 10px;
            padding: 10px 0 10px 20px;
        }
    </style>
</head>

<body>
  
  <div class="shell">
     <details>
       <summary>目前空</summary>
       <div class="folder">
       <p>空</p>
       <p>空</p>
       <details>
       <summary>目前空</summary>
       <div class="folder">
       <p>空</p>
       <p>空</p>
       </div>
       </details>
       </div>
       </details>                     
       </div>
        </details>
                    </div>
                </details>
              
                    </div>
                </details>
            </div>
        </details>
    </div>
</body>
</html>
